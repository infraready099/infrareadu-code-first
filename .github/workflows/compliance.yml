name: Compliance & Security Scan

on:
  push:
    branches: [main, develop]
    paths:
      - "packages/modules/**"
      - ".github/workflows/compliance.yml"
      - ".checkov.yaml"
  pull_request:
    branches: [main]
    paths:
      - "packages/modules/**"
      - ".github/workflows/compliance.yml"
      - ".checkov.yaml"

# Required for SARIF upload to GitHub Security tab
permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # ─── OPENTOFU VALIDATE ────────────────────────────────────────────────────
  validate:
    name: OpenTofu Validate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - vpc
          - rds
          - ecs
          - storage
          - security
          - waf
          - vpc-endpoints
          - backup
          - inspector-ssm
          - kms
          - macie

    steps:
      - uses: actions/checkout@v4

      - name: Install OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "latest"

      - name: OpenTofu Init (${{ matrix.module }})
        run: tofu init -backend=false
        working-directory: packages/modules/${{ matrix.module }}

      - name: OpenTofu Validate (${{ matrix.module }})
        run: tofu validate
        working-directory: packages/modules/${{ matrix.module }}

  # ─── TFLINT ─────────────────────────────────────────────────────────────
  tflint:
    name: TFLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: "latest"

      - name: Init TFLint
        run: tflint --init

      - name: Run TFLint on all modules
        run: |
          ERRORS=0
          for module in packages/modules/*/; do
            echo "── Linting $module"
            tflint --chdir="$module" --format=compact || ERRORS=$((ERRORS+1))
          done
          if [ $ERRORS -gt 0 ]; then
            echo "❌ $ERRORS module(s) failed TFLint"
            exit 1
          fi

  # ─── CHECKOV — POLICY AS CODE ────────────────────────────────────────────
  checkov:
    name: Checkov Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Checkov
        id: checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: packages/modules
          framework: terraform
          config_file: .checkov.yaml
          soft_fail: true
          output_format: sarif
          output_file_path: checkov-results.sarif

      - name: Upload Checkov SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov-results.sarif

  # ─── SOC2 CONFORMANCE CHECK ──────────────────────────────────────────────
  soc2-check:
    name: SOC2 Conformance Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required SOC2 controls
        run: |
          echo "Checking SOC2 required resources..."
          ERRORS=0

          check_exists() {
            if grep -r "$1" packages/modules/ --include="*.tf" -q; then
              echo "✅ $2"
            else
              echo "❌ MISSING: $2"
              ERRORS=$((ERRORS+1))
            fi
          }

          check_exists "aws_cloudtrail"                    "CloudTrail (CC7.2 — Audit logging)"
          check_exists "is_multi_region_trail.*true"       "Multi-region CloudTrail (CC7.2)"
          check_exists "enable_log_file_validation.*true"  "CloudTrail log validation (CC7.2)"
          check_exists "aws_guardduty_detector"            "GuardDuty (CC7.1 — Threat detection)"
          check_exists "aws_securityhub_account"           "Security Hub (CC4.1 — Monitoring)"
          check_exists "aws_config_configuration_recorder" "AWS Config (CC6.1 — Change management)"
          check_exists "aws_wafv2_web_acl"                 "WAF (CC6.6 — Boundary protection)"
          check_exists "aws_vpc_endpoint"                  "VPC Endpoints (CC6.7 — Transmission security)"
          check_exists "storage_encrypted.*true"           "RDS encryption (CC6.1 — Data protection)"
          check_exists "publicly_accessible.*false"        "No public DB access (CC6.1)"
          check_exists "prevent_destroy.*true"             "Deletion protection (A1.2 — Availability)"
          check_exists "aws_iam_account_password_policy"   "IAM password policy (CC6.2)"
          check_exists "aws_kms_key"                       "KMS customer-managed keys (CC6.1)"
          check_exists "aws_cloudwatch_metric_alarm"       "CloudWatch alarms (CC7.3 — Incident response)"
          check_exists "aws_flow_log"                      "VPC flow logs (CC6.1 — Network monitoring)"
          check_exists "block_public_acls.*true"           "S3 public access block (CC6.1)"
          check_exists "aws_backup_vault"                  "Centralized backup (A1.2 — Availability)"
          check_exists "aws_macie2_account"                "Macie PHI detection (CC6.1 — Data classification)"
          check_exists "aws_inspector2_enabler"            "Inspector vulnerability scanning (CC7.1)"

          if [ $ERRORS -gt 0 ]; then
            echo ""
            echo "❌ $ERRORS SOC2 control(s) missing. Fix before merging."
            exit 1
          else
            echo ""
            echo "✅ All SOC2 controls present."
          fi

  # ─── HIPAA CHECK ─────────────────────────────────────────────────────────
  hipaa-check:
    name: HIPAA Controls Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check HIPAA required controls
        run: |
          echo "Checking HIPAA required controls..."
          ERRORS=0

          check_exists() {
            if grep -r "$1" packages/modules/ --include="*.tf" -q; then
              echo "✅ $2"
            else
              echo "⚠️  REVIEW: $2"
              ERRORS=$((ERRORS+1))
            fi
          }

          check_exists "aws_kms_key"               "KMS CMK encryption (§164.312(a)(2)(iv))"
          check_exists "enable_key_rotation.*true"  "KMS key rotation (§164.312(a)(2)(iv))"
          check_exists "aws_cloudtrail"             "Audit controls (§164.312(b))"
          check_exists "pgaudit"                    "PostgreSQL statement logging (§164.312(b))"
          check_exists "aws_guardduty"              "Security incident monitoring (§164.308(a)(6))"
          check_exists "backup_retention_period"    "Backup for availability (§164.310(d))"
          check_exists "aws_backup_vault_lock"      "Immutable backup retention (§164.310(d))"
          check_exists "storage_encrypted.*true"    "PHI encryption at rest (§164.312(a)(2)(iv))"
          check_exists "aws_secretsmanager"         "Access control to credentials (§164.312(d))"
          check_exists "aws_vpc"                    "Network access controls (§164.312(a)(1))"
          check_exists "aws_wafv2_web_acl"          "Transmission security (§164.312(e)(1))"
          check_exists "aws_macie2_account"         "PHI detection in S3 (§164.308(a)(1))"
          check_exists "aws_inspector2_enabler"     "Vulnerability scanning (§164.308(a)(8))"
          check_exists "aws_ssm_document"           "Privileged access logging (§164.312(b))"

          if [ $ERRORS -gt 0 ]; then
            echo ""
            echo "⚠️  $ERRORS HIPAA control(s) need review. Not all are auto-verifiable."
          else
            echo "✅ All automated HIPAA checks passed."
          fi
