AWSTemplateFormatVersion: "2010-09-09"
Description: >
  InfraReady Bootstrap Role — deploy this ONE-TIME in your AWS account.
  Creates the IAM role InfraReady assumes (via cross-account STS) to deploy
  your infrastructure. Uses ExternalId to prevent confused deputy attacks.
  Every action in this policy is explicitly named — no wildcards.
  InfraReady cannot read your data, access other accounts, or take actions
  outside this list.

# ─── PARAMETERS ────────────────────────────────────────────────────────────────

Parameters:
  ExternalId:
    Type: String
    Description: >
      Unique secret token generated by InfraReady for your account.
      Copy this from the InfraReady onboarding wizard — do not share it.
    MinLength: 16
    MaxLength: 128
    AllowedPattern: "^[a-zA-Z0-9_-]+$"
    ConstraintDescription: Must be 16-128 alphanumeric characters, hyphens, or underscores.

  InfraReadyAccountId:
    Type: String
    Description: >
      InfraReady's AWS account ID. Only this account can assume the role.
      Change only if directed by InfraReady support.
    Default: "073941171096"
    AllowedPattern: "^[0-9]{12}$"
    ConstraintDescription: Must be a 12-digit AWS account ID.

# ─── RESOURCES ─────────────────────────────────────────────────────────────────

Resources:
  InfraReadyRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: InfraReadyRole
      Description: >
        Cross-account role assumed by InfraReady's deployment runner.
        Scoped to the minimum permissions needed to deploy and manage
        InfraReady's OpenTofu modules. No wildcards — every action is
        explicitly named so you can audit exactly what InfraReady can do.

      # ── Trust Policy ─────────────────────────────────────────────────────────
      # Only InfraReady's account can assume this role, and ONLY when it
      # presents the ExternalId matching your account's unique token.
      # This prevents confused deputy attacks where a third party tricks
      # InfraReady into acting on their behalf using your role.
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowInfraReadyAssumeRole
            Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${InfraReadyAccountId}:root"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId

      MaxSessionDuration: 7200  # 2 hours — matches runner STS DurationSeconds

      # ── Inline Policy ────────────────────────────────────────────────────────
      # Inline (not managed) so it stays in sync with this stack and
      # cannot be detached or modified independently.
      # Every action is explicitly named — no service-level wildcards.
      Policies:
        - PolicyName: InfraReadyRunnerPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:

              # ─────────────────────────────────────────────────────────────────
              # DENY: Protect the InfraReady role itself from self-modification
              # ─────────────────────────────────────────────────────────────────
              - Sid: DenyDeleteInfraReadyRole
                Effect: Deny
                Action:
                  - iam:DeleteRole
                  - iam:DetachRolePolicy
                  - iam:DeleteRolePolicy
                Resource: !Sub "arn:aws:iam::${AWS::AccountId}:role/InfraReadyRole"

              # ─────────────────────────────────────────────────────────────────
              # NETWORKING — VPC module
              # VPC, subnets, IGW, NAT, EIP, routes, security groups,
              # flow logs, network interfaces, VPC endpoints, AZ queries
              # ─────────────────────────────────────────────────────────────────
              - Sid: EC2Networking
                Effect: Allow
                Action:
                  # VPC
                  - ec2:CreateVpc
                  - ec2:DeleteVpc
                  - ec2:DescribeVpcs
                  - ec2:ModifyVpcAttribute
                  - ec2:DescribeVpcAttribute
                  # Subnets
                  - ec2:CreateSubnet
                  - ec2:DeleteSubnet
                  - ec2:DescribeSubnets
                  - ec2:ModifySubnetAttribute
                  # Internet Gateway
                  - ec2:CreateInternetGateway
                  - ec2:DeleteInternetGateway
                  - ec2:AttachInternetGateway
                  - ec2:DetachInternetGateway
                  - ec2:DescribeInternetGateways
                  # NAT Gateway
                  - ec2:CreateNatGateway
                  - ec2:DeleteNatGateway
                  - ec2:DescribeNatGateways
                  # Elastic IPs (NAT gateway requires one)
                  - ec2:AllocateAddress
                  - ec2:ReleaseAddress
                  - ec2:AssociateAddress
                  - ec2:DisassociateAddress
                  - ec2:DescribeAddresses
                  # Route Tables
                  - ec2:CreateRouteTable
                  - ec2:DeleteRouteTable
                  - ec2:AssociateRouteTable
                  - ec2:DisassociateRouteTable
                  - ec2:DescribeRouteTables
                  - ec2:CreateRoute
                  - ec2:DeleteRoute
                  - ec2:ReplaceRoute
                  # Security Groups
                  - ec2:CreateSecurityGroup
                  - ec2:DeleteSecurityGroup
                  - ec2:DescribeSecurityGroups
                  - ec2:AuthorizeSecurityGroupIngress
                  - ec2:RevokeSecurityGroupIngress
                  - ec2:AuthorizeSecurityGroupEgress
                  - ec2:RevokeSecurityGroupEgress
                  - ec2:DescribeSecurityGroupRules
                  - ec2:ModifySecurityGroupRules
                  - ec2:UpdateSecurityGroupRuleDescriptionsIngress
                  - ec2:UpdateSecurityGroupRuleDescriptionsEgress
                  # VPC Flow Logs
                  - ec2:CreateFlowLogs
                  - ec2:DeleteFlowLogs
                  - ec2:DescribeFlowLogs
                  # Network ACLs
                  - ec2:DescribeNetworkAcls
                  - ec2:CreateNetworkAclEntry
                  - ec2:DeleteNetworkAclEntry
                  - ec2:ReplaceNetworkAclEntry
                  # Network Interfaces (ECS Fargate requires these)
                  - ec2:CreateNetworkInterface
                  - ec2:DeleteNetworkInterface
                  - ec2:DescribeNetworkInterfaces
                  - ec2:AttachNetworkInterface
                  - ec2:DetachNetworkInterface
                  - ec2:DescribeNetworkInterfaceAttribute
                  - ec2:ModifyNetworkInterfaceAttribute
                  # VPC Endpoints (vpc-endpoints module)
                  - ec2:CreateVpcEndpoint
                  - ec2:DeleteVpcEndpoints
                  - ec2:DescribeVpcEndpoints
                  - ec2:ModifyVpcEndpoint
                  - ec2:DescribeVpcEndpointServices
                  - ec2:DescribePrefixLists
                  # General lookups
                  - ec2:DescribeAvailabilityZones
                  - ec2:DescribeAccountAttributes
                  - ec2:DescribeImages
                  - ec2:DescribeRegions
                  # Tags
                  - ec2:CreateTags
                  - ec2:DeleteTags
                  - ec2:DescribeTags
                Resource: "*"

              # ─────────────────────────────────────────────────────────────────
              # CONTAINER COMPUTE — ECS module
              # ECS clusters, services, task definitions, capacity providers
              # ─────────────────────────────────────────────────────────────────
              - Sid: ECS
                Effect: Allow
                Action:
                  # Clusters
                  - ecs:CreateCluster
                  - ecs:DeleteCluster
                  - ecs:DescribeClusters
                  - ecs:ListClusters
                  - ecs:UpdateClusterSettings
                  - ecs:PutClusterCapacityProviders
                  # Services
                  - ecs:CreateService
                  - ecs:DeleteService
                  - ecs:UpdateService
                  - ecs:DescribeServices
                  - ecs:ListServices
                  # Task definitions
                  - ecs:RegisterTaskDefinition
                  - ecs:DeregisterTaskDefinition
                  - ecs:DescribeTaskDefinition
                  - ecs:ListTaskDefinitions
                  # Tasks (needed for drain on destroy)
                  - ecs:ListTasks
                  - ecs:DescribeTasks
                  - ecs:StopTask
                  - ecs:RunTask
                  # Capacity providers
                  - ecs:CreateCapacityProvider
                  - ecs:DeleteCapacityProvider
                  - ecs:UpdateCapacityProvider
                  - ecs:DescribeCapacityProviders
                  # Tags
                  - ecs:TagResource
                  - ecs:UntagResource
                  - ecs:ListTagsForResource
                Resource: "*"

              # ─────────────────────────────────────────────────────────────────
              # CONTAINER REGISTRY — ECR
              # Push/pull images, lifecycle policies, repository settings
              # ─────────────────────────────────────────────────────────────────
              - Sid: ECR
                Effect: Allow
                Action:
                  - ecr:CreateRepository
                  - ecr:DeleteRepository
                  - ecr:DescribeRepositories
                  - ecr:ListImages
                  - ecr:BatchGetImage
                  - ecr:BatchCheckLayerAvailability
                  - ecr:GetDownloadUrlForLayer
                  - ecr:PutImage
                  - ecr:InitiateLayerUpload
                  - ecr:UploadLayerPart
                  - ecr:CompleteLayerUpload
                  - ecr:PutImageScanningConfiguration
                  - ecr:PutImageTagMutability
                  - ecr:PutLifecyclePolicy
                  - ecr:GetLifecyclePolicy
                  - ecr:DeleteLifecyclePolicy
                  - ecr:SetRepositoryPolicy
                  - ecr:GetRepositoryPolicy
                  - ecr:DeleteRepositoryPolicy
                  - ecr:GetAuthorizationToken
                  - ecr:TagResource
                  - ecr:UntagResource
                  - ecr:ListTagsForResource
                Resource: "*"

              # ─────────────────────────────────────────────────────────────────
              # DATABASE — RDS module
              # Instances, clusters, subnet/parameter groups, snapshots
              # ─────────────────────────────────────────────────────────────────
              - Sid: RDS
                Effect: Allow
                Action:
                  # Instances
                  - rds:CreateDBInstance
                  - rds:DeleteDBInstance
                  - rds:ModifyDBInstance
                  - rds:DescribeDBInstances
                  - rds:RebootDBInstance
                  # Clusters (Aurora)
                  - rds:CreateDBCluster
                  - rds:DeleteDBCluster
                  - rds:ModifyDBCluster
                  - rds:DescribeDBClusters
                  - rds:CreateDBClusterParameterGroup
                  - rds:ModifyDBClusterParameterGroup
                  - rds:DeleteDBClusterParameterGroup
                  - rds:DescribeDBClusterParameterGroups
                  - rds:DescribeDBClusterParameters
                  # Parameter groups
                  - rds:CreateDBParameterGroup
                  - rds:ModifyDBParameterGroup
                  - rds:DeleteDBParameterGroup
                  - rds:DescribeDBParameterGroups
                  - rds:DescribeDBParameters
                  # Subnet groups
                  - rds:CreateDBSubnetGroup
                  - rds:DeleteDBSubnetGroup
                  - rds:ModifyDBSubnetGroup
                  - rds:DescribeDBSubnetGroups
                  # Snapshots
                  - rds:CreateDBSnapshot
                  - rds:DeleteDBSnapshot
                  - rds:DescribeDBSnapshots
                  - rds:CreateDBClusterSnapshot
                  - rds:DeleteDBClusterSnapshot
                  - rds:DescribeDBClusterSnapshots
                  # Option groups
                  - rds:CreateOptionGroup
                  - rds:DeleteOptionGroup
                  - rds:ModifyOptionGroup
                  - rds:DescribeOptionGroups
                  # General
                  - rds:DescribeDBEngineVersions
                  - rds:DescribeOrderableDBInstanceOptions
                  - rds:DescribeDBInstanceAutomatedBackups
                  - rds:DescribeDBSecurityGroups
                  # Tags
                  - rds:AddTagsToResource
                  - rds:RemoveTagsFromResource
                  - rds:ListTagsForResource
                Resource: "*"

              # ─────────────────────────────────────────────────────────────────
              # OBJECT STORAGE — storage module + OpenTofu state backend
              # S3 is used for both the state bucket (in customer's own account)
              # and the storage module (app uploads, ALB logs, CloudFront assets)
              # ─────────────────────────────────────────────────────────────────
              - Sid: S3
                Effect: Allow
                Action:
                  # Bucket lifecycle
                  - s3:CreateBucket
                  - s3:DeleteBucket
                  - s3:ListBucket
                  - s3:ListAllMyBuckets
                  - s3:GetBucketLocation
                  # Versioning
                  - s3:GetBucketVersioning
                  - s3:PutBucketVersioning
                  - s3:ListBucketVersions
                  # Encryption
                  - s3:GetBucketEncryption
                  - s3:PutBucketEncryption
                  # Public access block
                  - s3:GetBucketPublicAccessBlock
                  - s3:PutBucketPublicAccessBlock
                  # Lifecycle rules
                  - s3:GetLifecycleConfiguration
                  - s3:PutLifecycleConfiguration
                  - s3:DeleteLifecycleConfiguration
                  # Bucket policy
                  - s3:GetBucketPolicy
                  - s3:PutBucketPolicy
                  - s3:DeleteBucketPolicy
                  - s3:GetBucketPolicyStatus
                  # Logging
                  - s3:GetBucketLogging
                  - s3:PutBucketLogging
                  # Tagging
                  - s3:GetBucketTagging
                  - s3:PutBucketTagging
                  - s3:DeleteBucketTagging
                  # CORS
                  - s3:GetBucketCORS
                  - s3:PutBucketCORS
                  - s3:DeleteBucketCORS
                  # Website
                  - s3:GetBucketWebsite
                  - s3:PutBucketWebsite
                  - s3:DeleteBucketWebsite
                  # ACL
                  - s3:GetBucketAcl
                  - s3:PutBucketAcl
                  # Object lock
                  - s3:GetBucketObjectLockConfiguration
                  - s3:PutBucketObjectLockConfiguration
                  # Notifications
                  - s3:GetBucketNotification
                  - s3:PutBucketNotification
                  # Objects (state files + app assets)
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:GetObjectVersion
                  - s3:DeleteObjectVersion
                  - s3:GetObjectAcl
                  - s3:PutObjectAcl
                  - s3:GetObjectTagging
                  - s3:PutObjectTagging
                  - s3:DeleteObjectTagging
                  - s3:ListBucketMultipartUploads
                  - s3:AbortMultipartUpload
                  # Replication (optional modules)
                  - s3:GetReplicationConfiguration
                  - s3:PutReplicationConfiguration
                Resource: "*"

              # ─────────────────────────────────────────────────────────────────
              # IAM — Module Role Creation
              # OpenTofu modules create service roles (ECS task, RDS monitoring,
              # GitHub Actions OIDC, etc.). These are the ONLY IAM actions needed.
              # Note: no iam:* wildcard. The DenyDeleteInfraReadyRole Deny above
              # protects this role from self-modification.
              # ─────────────────────────────────────────────────────────────────
              - Sid: IAMRoleManagement
                Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:GetRole
                  - iam:UpdateRole
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:PutRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:GetRolePolicy
                  - iam:ListRolePolicies
                  - iam:ListAttachedRolePolicies
                  - iam:PassRole
                  - iam:CreateInstanceProfile
                  - iam:DeleteInstanceProfile
                  - iam:AddRoleToInstanceProfile
                  - iam:RemoveRoleFromInstanceProfile
                  - iam:GetInstanceProfile
                  - iam:ListInstanceProfilesForRole
                  - iam:TagRole
                  - iam:UntagRole
                  - iam:ListRoleTags
                  - iam:CreatePolicy
                  - iam:DeletePolicy
                  - iam:GetPolicy
                  - iam:GetPolicyVersion
                  - iam:CreatePolicyVersion
                  - iam:DeletePolicyVersion
                  - iam:ListPolicyVersions
                  - iam:ListPolicies
                  # Required on first ALB deploy — ELB creates its service-linked role
                  - iam:CreateServiceLinkedRole
                  - iam:GetServiceLinkedRoleDeletionStatus
                  # GitHub Actions OIDC provider (security module)
                  - iam:CreateOpenIDConnectProvider
                  - iam:GetOpenIDConnectProvider
                  - iam:DeleteOpenIDConnectProvider
                  - iam:TagOpenIDConnectProvider
                  - iam:UntagOpenIDConnectProvider
                  - iam:UpdateOpenIDConnectProviderThumbprint
                  - iam:ListOpenIDConnectProviders
                  # Password policy (security module)
                  - iam:UpdateAccountPasswordPolicy
                  - iam:GetAccountPasswordPolicy
                  - iam:DeleteAccountPasswordPolicy
                Resource: "*"

              # ─────────────────────────────────────────────────────────────────
              # CLOUDFORMATION
              # Some modules create nested stacks; runner checks stack state
              # ─────────────────────────────────────────────────────────────────
              - Sid: CloudFormation
                Effect: Allow
                Action:
                  - cloudformation:CreateStack
                  - cloudformation:UpdateStack
                  - cloudformation:DeleteStack
                  - cloudformation:DescribeStacks
                  - cloudformation:DescribeStackEvents
                  - cloudformation:DescribeStackResources
                  - cloudformation:DescribeStackResource
                  - cloudformation:GetTemplate
                  - cloudformation:ValidateTemplate
                  - cloudformation:ListStacks
                  - cloudformation:ListStackResources
                  - cloudformation:GetStackPolicy
                  - cloudformation:SetStackPolicy
                  - cloudformation:CreateChangeSet
                  - cloudformation:DeleteChangeSet
                  - cloudformation:DescribeChangeSet
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:TagResource
                  - cloudformation:UntagResource
                Resource: "*"

              # ─────────────────────────────────────────────────────────────────
              # SECURITY BASELINE — security module
              # CloudTrail audit logging, CloudWatch alarms, CloudWatch Logs,
              # AWS Config rules for compliance
              # ─────────────────────────────────────────────────────────────────
              - Sid: CloudTrail
                Effect: Allow
                Action:
                  - cloudtrail:CreateTrail
                  - cloudtrail:DeleteTrail
                  - cloudtrail:UpdateTrail
                  - cloudtrail:DescribeTrails
                  - cloudtrail:GetTrailStatus
                  - cloudtrail:StartLogging
                  - cloudtrail:StopLogging
                  - cloudtrail:PutEventSelectors
                  - cloudtrail:GetEventSelectors
                  - cloudtrail:AddTags
                  - cloudtrail:RemoveTags
                  - cloudtrail:ListTags
                Resource: "*"

              - Sid: CloudWatch
                Effect: Allow
                Action:
                  - cloudwatch:PutMetricAlarm
                  - cloudwatch:DeleteAlarms
                  - cloudwatch:DescribeAlarms
                  - cloudwatch:DescribeAlarmHistory
                  - cloudwatch:SetAlarmState
                  - cloudwatch:PutDashboard
                  - cloudwatch:DeleteDashboards
                  - cloudwatch:GetDashboard
                  - cloudwatch:ListDashboards
                  - cloudwatch:GetMetricStatistics
                  - cloudwatch:GetMetricData
                  - cloudwatch:ListMetrics
                  - cloudwatch:TagResource
                  - cloudwatch:UntagResource
                  - cloudwatch:ListTagsForResource
                Resource: "*"

              - Sid: CloudWatchLogs
                Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:DeleteLogGroup
                  - logs:DescribeLogGroups
                  - logs:CreateLogStream
                  - logs:DeleteLogStream
                  - logs:DescribeLogStreams
                  - logs:PutLogEvents
                  - logs:GetLogEvents
                  - logs:FilterLogEvents
                  - logs:PutRetentionPolicy
                  - logs:DeleteRetentionPolicy
                  - logs:AssociateKmsKey
                  - logs:DisassociateKmsKey
                  - logs:PutSubscriptionFilter
                  - logs:DeleteSubscriptionFilter
                  - logs:DescribeSubscriptionFilters
                  - logs:TagLogGroup
                  - logs:UntagLogGroup
                  - logs:TagResource
                  - logs:UntagResource
                  - logs:ListTagsForResource
                  - logs:ListTagsLogGroup
                Resource: "*"

              - Sid: AWSConfig
                Effect: Allow
                Action:
                  - config:PutConfigRule
                  - config:DeleteConfigRule
                  - config:DescribeConfigRules
                  - config:GetComplianceDetailsByConfigRule
                  - config:DescribeComplianceByConfigRule
                  - config:PutConfigurationRecorder
                  - config:DeleteConfigurationRecorder
                  - config:DescribeConfigurationRecorders
                  - config:DescribeConfigurationRecorderStatus
                  - config:StartConfigurationRecorder
                  - config:StopConfigurationRecorder
                  - config:PutDeliveryChannel
                  - config:DeleteDeliveryChannel
                  - config:DescribeDeliveryChannels
                  - config:PutRemediationConfigurations
                  - config:DeleteRemediationConfiguration
                  - config:DescribeRemediationConfigurations
                  - config:TagResource
                  - config:UntagResource
                Resource: "*"

              # EventBridge — used by security module to route GuardDuty/SecurityHub findings
              - Sid: EventBridge
                Effect: Allow
                Action:
                  - events:PutRule
                  - events:PutTargets
                  - events:DescribeRule
                  - events:DeleteRule
                  - events:RemoveTargets
                  - events:ListTargetsByRule
                  - events:ListRuleNamesByTarget
                  - events:EnableRule
                  - events:DisableRule
                  - events:ListTagsForResource
                  - events:TagResource
                  - events:UntagResource
                Resource: "*"

              # ─────────────────────────────────────────────────────────────────
              # THREAT DETECTION — GuardDuty + Security Hub
              # ─────────────────────────────────────────────────────────────────
              - Sid: GuardDuty
                Effect: Allow
                Action:
                  - guardduty:CreateDetector
                  - guardduty:DeleteDetector
                  - guardduty:UpdateDetector
                  - guardduty:GetDetector
                  - guardduty:ListDetectors
                  - guardduty:CreateFilter
                  - guardduty:DeleteFilter
                  - guardduty:UpdateFilter
                  - guardduty:GetFilter
                  - guardduty:ListFilters
                  - guardduty:TagResource
                  - guardduty:UntagResource
                  - guardduty:ListTagsForResource
                Resource: "*"

              - Sid: SecurityHub
                Effect: Allow
                Action:
                  - securityhub:EnableSecurityHub
                  - securityhub:DisableSecurityHub
                  - securityhub:DescribeHub
                  - securityhub:UpdateHub
                  - securityhub:BatchEnableStandards
                  - securityhub:BatchDisableStandards
                  - securityhub:DescribeStandards
                  - securityhub:DescribeStandardsControls
                  - securityhub:UpdateStandardsControl
                  - securityhub:GetEnabledStandards
                  - securityhub:GetFindings
                  - securityhub:CreateInsight
                  - securityhub:UpdateInsight
                  - securityhub:DeleteInsight
                  - securityhub:GetInsights
                  - securityhub:BatchImportFindings
                  - securityhub:TagResource
                  - securityhub:UntagResource
                  - securityhub:ListTagsForResource
                Resource: "*"

              # ─────────────────────────────────────────────────────────────────
              # KMS — kms module
              # Customer-managed keys for RDS, S3, ECS secrets encryption
              # ─────────────────────────────────────────────────────────────────
              - Sid: KMS
                Effect: Allow
                Action:
                  - kms:CreateKey
                  - kms:ScheduleKeyDeletion
                  - kms:CancelKeyDeletion
                  - kms:DisableKey
                  - kms:EnableKey
                  - kms:DescribeKey
                  - kms:ListKeys
                  - kms:CreateAlias
                  - kms:DeleteAlias
                  - kms:UpdateAlias
                  - kms:ListAliases
                  - kms:Encrypt
                  - kms:Decrypt
                  - kms:GenerateDataKey
                  - kms:GenerateDataKeyWithoutPlaintext
                  - kms:ReEncryptFrom
                  - kms:ReEncryptTo
                  - kms:EnableKeyRotation
                  - kms:DisableKeyRotation
                  - kms:GetKeyRotationStatus
                  - kms:GetKeyPolicy
                  - kms:PutKeyPolicy
                  - kms:ListKeyPolicies
                  - kms:CreateGrant
                  - kms:RetireGrant
                  - kms:RevokeGrant
                  - kms:ListGrants
                  - kms:TagResource
                  - kms:UntagResource
                  - kms:ListResourceTags
                Resource: "*"

              # ─────────────────────────────────────────────────────────────────
              # BACKUP — backup module
              # ─────────────────────────────────────────────────────────────────
              - Sid: Backup
                Effect: Allow
                Action:
                  - backup:CreateBackupVault
                  - backup:DeleteBackupVault
                  - backup:DescribeBackupVault
                  - backup:ListBackupVaults
                  - backup:PutBackupVaultAccessPolicy
                  - backup:GetBackupVaultAccessPolicy
                  - backup:DeleteBackupVaultAccessPolicy
                  - backup:CreateBackupPlan
                  - backup:DeleteBackupPlan
                  - backup:UpdateBackupPlan
                  - backup:DescribeBackupPlan
                  - backup:GetBackupPlan
                  - backup:ListBackupPlans
                  - backup:CreateBackupSelection
                  - backup:DeleteBackupSelection
                  - backup:GetBackupSelection
                  - backup:ListBackupSelections
                  - backup:StartBackupJob
                  - backup:DescribeBackupJob
                  - backup:ListBackupJobs
                  - backup:GetRecoveryPointRestoreMetadata
                  - backup:DescribeRecoveryPoint
                  - backup:ListRecoveryPointsByBackupVault
                  - backup:TagResource
                  - backup:UntagResource
                  - backup:ListTags
                  - backup-storage:MountCapsule
                Resource: "*"

              # ─────────────────────────────────────────────────────────────────
              # VULNERABILITY SCANNING — inspector-ssm module
              # Inspector2 for CVE scanning, SSM for parameter store
              # ─────────────────────────────────────────────────────────────────
              - Sid: Inspector
                Effect: Allow
                Action:
                  - inspector2:Enable
                  - inspector2:Disable
                  - inspector2:BatchGetAccountStatus
                  - inspector2:ListFindings
                  - inspector2:BatchGetFindingDetails
                  - inspector2:CreateFilter
                  - inspector2:DeleteFilter
                  - inspector2:UpdateFilter
                  - inspector2:ListFilters
                  - inspector2:GetConfiguration
                  - inspector2:UpdateConfiguration
                Resource: "*"

              - Sid: SSM
                Effect: Allow
                Action:
                  - ssm:CreateDocument
                  - ssm:DeleteDocument
                  - ssm:DescribeDocument
                  - ssm:GetDocument
                  - ssm:ListDocuments
                  - ssm:UpdateDocument
                  - ssm:PutParameter
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                  - ssm:DeleteParameter
                  - ssm:DeleteParameters
                  - ssm:DescribeParameters
                  - ssm:AddTagsToResource
                  - ssm:RemoveTagsFromResource
                  - ssm:ListTagsForResource
                Resource: "*"

              # ─────────────────────────────────────────────────────────────────
              # DATA CLASSIFICATION — macie module
              # ─────────────────────────────────────────────────────────────────
              - Sid: Macie
                Effect: Allow
                Action:
                  - macie2:EnableMacie
                  - macie2:DisableMacie
                  - macie2:GetMacieSession
                  - macie2:UpdateMacieSession
                  - macie2:CreateClassificationJob
                  - macie2:DescribeClassificationJob
                  - macie2:UpdateClassificationJob
                  - macie2:CancelClassificationJob
                  - macie2:ListClassificationJobs
                  - macie2:CreateFindingsFilter
                  - macie2:DeleteFindingsFilter
                  - macie2:UpdateFindingsFilter
                  - macie2:GetFindingsFilter
                  - macie2:ListFindingsFilters
                  - macie2:GetFindings
                  - macie2:ListFindings
                  - macie2:GetFindingStatistics
                  - macie2:TagResource
                  - macie2:UntagResource
                Resource: "*"

              # ─────────────────────────────────────────────────────────────────
              # WEB APPLICATION FIREWALL — waf module
              # ─────────────────────────────────────────────────────────────────
              - Sid: WAF
                Effect: Allow
                Action:
                  - wafv2:CreateWebACL
                  - wafv2:DeleteWebACL
                  - wafv2:UpdateWebACL
                  - wafv2:GetWebACL
                  - wafv2:GetWebACLForResource
                  - wafv2:ListWebACLs
                  - wafv2:AssociateWebACL
                  - wafv2:DisassociateWebACL
                  - wafv2:CreateRuleGroup
                  - wafv2:DeleteRuleGroup
                  - wafv2:UpdateRuleGroup
                  - wafv2:GetRuleGroup
                  - wafv2:ListRuleGroups
                  - wafv2:CreateIPSet
                  - wafv2:DeleteIPSet
                  - wafv2:UpdateIPSet
                  - wafv2:GetIPSet
                  - wafv2:ListIPSets
                  - wafv2:CreateRegexPatternSet
                  - wafv2:DeleteRegexPatternSet
                  - wafv2:UpdateRegexPatternSet
                  - wafv2:GetRegexPatternSet
                  - wafv2:ListRegexPatternSets
                  - wafv2:PutLoggingConfiguration
                  - wafv2:GetLoggingConfiguration
                  - wafv2:DeleteLoggingConfiguration
                  - wafv2:ListLoggingConfigurations
                  - wafv2:CheckCapacity
                  - wafv2:DescribeManagedRuleGroup
                  - wafv2:ListAvailableManagedRuleGroups
                  - wafv2:ListAvailableManagedRuleGroupVersions
                  - wafv2:TagResource
                  - wafv2:UntagResource
                  - wafv2:ListTagsForResource
                Resource: "*"

              # ─────────────────────────────────────────────────────────────────
              # SECRETS MANAGER
              # RDS passwords and API keys — stored in Secrets Manager, never
              # in environment variables or state files
              # ─────────────────────────────────────────────────────────────────
              - Sid: SecretsManager
                Effect: Allow
                Action:
                  - secretsmanager:CreateSecret
                  - secretsmanager:DeleteSecret
                  - secretsmanager:RestoreSecret
                  - secretsmanager:UpdateSecret
                  - secretsmanager:PutSecretValue
                  - secretsmanager:GetSecretValue
                  - secretsmanager:DescribeSecret
                  - secretsmanager:ListSecrets
                  - secretsmanager:ListSecretVersionIds
                  - secretsmanager:GetResourcePolicy
                  - secretsmanager:PutResourcePolicy
                  - secretsmanager:DeleteResourcePolicy
                  - secretsmanager:RotateSecret
                  - secretsmanager:CancelRotateSecret
                  - secretsmanager:TagResource
                  - secretsmanager:UntagResource
                Resource: "*"

              # ─────────────────────────────────────────────────────────────────
              # SNS — security module alerting
              # Budget alerts, GuardDuty/CloudWatch alarm notifications
              # ─────────────────────────────────────────────────────────────────
              - Sid: SNS
                Effect: Allow
                Action:
                  - sns:CreateTopic
                  - sns:DeleteTopic
                  - sns:GetTopicAttributes
                  - sns:SetTopicAttributes
                  - sns:ListTopics
                  - sns:Subscribe
                  - sns:Unsubscribe
                  - sns:GetSubscriptionAttributes
                  - sns:SetSubscriptionAttributes
                  - sns:ListSubscriptionsByTopic
                  - sns:Publish
                  - sns:TagResource
                  - sns:UntagResource
                  - sns:ListTagsForResource
                Resource: "*"

              # ─────────────────────────────────────────────────────────────────
              # LOAD BALANCER — ECS module ALB
              # Application Load Balancer, target groups, listeners, rules
              # ─────────────────────────────────────────────────────────────────
              - Sid: ELB
                Effect: Allow
                Action:
                  - elasticloadbalancing:CreateLoadBalancer
                  - elasticloadbalancing:DeleteLoadBalancer
                  - elasticloadbalancing:DescribeLoadBalancers
                  - elasticloadbalancing:DescribeLoadBalancerAttributes
                  - elasticloadbalancing:ModifyLoadBalancerAttributes
                  - elasticloadbalancing:SetSecurityGroups
                  - elasticloadbalancing:SetSubnets
                  - elasticloadbalancing:SetIpAddressType
                  - elasticloadbalancing:CreateTargetGroup
                  - elasticloadbalancing:DeleteTargetGroup
                  - elasticloadbalancing:ModifyTargetGroup
                  - elasticloadbalancing:ModifyTargetGroupAttributes
                  - elasticloadbalancing:DescribeTargetGroups
                  - elasticloadbalancing:DescribeTargetGroupAttributes
                  - elasticloadbalancing:DescribeTargetHealth
                  - elasticloadbalancing:RegisterTargets
                  - elasticloadbalancing:DeregisterTargets
                  - elasticloadbalancing:CreateListener
                  - elasticloadbalancing:DeleteListener
                  - elasticloadbalancing:ModifyListener
                  - elasticloadbalancing:DescribeListeners
                  - elasticloadbalancing:DescribeListenerCertificates
                  - elasticloadbalancing:AddListenerCertificates
                  - elasticloadbalancing:RemoveListenerCertificates
                  - elasticloadbalancing:CreateRule
                  - elasticloadbalancing:DeleteRule
                  - elasticloadbalancing:ModifyRule
                  - elasticloadbalancing:DescribeRules
                  - elasticloadbalancing:SetRulePriorities
                  - elasticloadbalancing:AddTags
                  - elasticloadbalancing:RemoveTags
                  - elasticloadbalancing:DescribeTags
                Resource: "*"

              # ─────────────────────────────────────────────────────────────────
              # TLS CERTIFICATES — ECS module HTTPS
              # ─────────────────────────────────────────────────────────────────
              - Sid: ACM
                Effect: Allow
                Action:
                  - acm:RequestCertificate
                  - acm:DeleteCertificate
                  - acm:DescribeCertificate
                  - acm:ListCertificates
                  - acm:GetCertificate
                  - acm:ImportCertificate
                  - acm:RenewCertificate
                  - acm:AddTagsToCertificate
                  - acm:RemoveTagsFromCertificate
                  - acm:ListTagsForCertificate
                Resource: "*"

              # ─────────────────────────────────────────────────────────────────
              # DNS — ECS module custom domain
              # ─────────────────────────────────────────────────────────────────
              - Sid: Route53
                Effect: Allow
                Action:
                  - route53:CreateHostedZone
                  - route53:DeleteHostedZone
                  - route53:GetHostedZone
                  - route53:ListHostedZones
                  - route53:ListHostedZonesByName
                  - route53:ChangeResourceRecordSets
                  - route53:ListResourceRecordSets
                  - route53:GetChange
                  - route53:CreateHealthCheck
                  - route53:DeleteHealthCheck
                  - route53:GetHealthCheck
                  - route53:ListHealthChecks
                  - route53:UpdateHealthCheck
                  - route53:ChangeTagsForResource
                  - route53:ListTagsForResource
                  - route53:ListTagsForResources
                  - route53domains:RegisterDomain
                  - route53domains:UpdateDomainNameservers
                  - route53domains:GetDomainDetail
                  - route53domains:ListDomains
                Resource: "*"

              # ─────────────────────────────────────────────────────────────────
              # CDN — storage module CloudFront distribution
              # ─────────────────────────────────────────────────────────────────
              - Sid: CloudFront
                Effect: Allow
                Action:
                  - cloudfront:CreateDistribution
                  - cloudfront:DeleteDistribution
                  - cloudfront:UpdateDistribution
                  - cloudfront:GetDistribution
                  - cloudfront:GetDistributionConfig
                  - cloudfront:ListDistributions
                  - cloudfront:CreateOriginAccessControl
                  - cloudfront:DeleteOriginAccessControl
                  - cloudfront:UpdateOriginAccessControl
                  - cloudfront:GetOriginAccessControl
                  - cloudfront:GetOriginAccessControlConfig
                  - cloudfront:ListOriginAccessControls
                  - cloudfront:CreateOriginAccessIdentity
                  - cloudfront:DeleteOriginAccessIdentity
                  - cloudfront:GetOriginAccessIdentity
                  - cloudfront:ListOriginAccessIdentities
                  - cloudfront:CreateInvalidation
                  - cloudfront:GetInvalidation
                  - cloudfront:ListInvalidations
                  - cloudfront:TagResource
                  - cloudfront:UntagResource
                  - cloudfront:ListTagsForResource
                Resource: "*"

              # ─────────────────────────────────────────────────────────────────
              # AUTO SCALING — ECS module service scaling
              # ─────────────────────────────────────────────────────────────────
              - Sid: AutoScaling
                Effect: Allow
                Action:
                  - application-autoscaling:RegisterScalableTarget
                  - application-autoscaling:DeregisterScalableTarget
                  - application-autoscaling:DescribeScalableTargets
                  - application-autoscaling:PutScalingPolicy
                  - application-autoscaling:DeleteScalingPolicy
                  - application-autoscaling:DescribeScalingPolicies
                  - application-autoscaling:PutScheduledAction
                  - application-autoscaling:DeleteScheduledAction
                  - application-autoscaling:DescribeScheduledActions
                  - autoscaling:CreateAutoScalingGroup
                  - autoscaling:UpdateAutoScalingGroup
                  - autoscaling:DeleteAutoScalingGroup
                  - autoscaling:DescribeAutoScalingGroups
                  - autoscaling:SetDesiredCapacity
                  - autoscaling:DescribeScalingActivities
                  - autoscaling:AttachLoadBalancerTargetGroups
                  - autoscaling:DetachLoadBalancerTargetGroups
                  - autoscaling:DescribeLoadBalancerTargetGroups
                Resource: "*"

              # ─────────────────────────────────────────────────────────────────
              # STS — caller identity verification
              # Runner calls GetCallerIdentity to verify the assumed-role session
              # is active before running OpenTofu
              # ─────────────────────────────────────────────────────────────────
              - Sid: STSVerify
                Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: "*"

      Tags:
        - Key: ManagedBy
          Value: infraready
        - Key: Purpose
          Value: cross-account-deployment-runner

# ─── OUTPUTS ───────────────────────────────────────────────────────────────────

Outputs:
  RoleArn:
    Description: >
      Paste this ARN into the InfraReady wizard to complete setup.
      InfraReady will store it and use it to deploy your infrastructure.
    Value: !GetAtt InfraReadyRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-RoleArn"

  RoleName:
    Description: IAM role name (for your own records).
    Value: !Ref InfraReadyRole

  ExternalIdReminder:
    Description: >
      Reminder — your ExternalId is the token you entered as a parameter.
      Keep it private. Rotating it requires redeploying this stack.
    Value: !Sub "ExternalId is stored as a CloudFormation parameter — check Parameter Store or InfraReady dashboard."
