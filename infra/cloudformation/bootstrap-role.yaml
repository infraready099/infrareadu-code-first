AWSTemplateFormatVersion: "2010-09-09"
Description: >
  InfraReady Bootstrap Role — deploy this ONE-TIME in your AWS account.
  Creates the IAM role InfraReady assumes (via cross-account STS) to deploy
  your infrastructure. Uses ExternalId to prevent confused deputy attacks.
  Review the inline policy carefully — it is scoped to only the resources and
  actions InfraReady's OpenTofu modules actually need.

# ─── PARAMETERS ────────────────────────────────────────────────────────────────

Parameters:
  ExternalId:
    Type: String
    Description: >
      Unique secret token generated by InfraReady for your account.
      Copy this from the InfraReady onboarding wizard — do not share it.
    MinLength: 16
    MaxLength: 128
    AllowedPattern: "^[a-zA-Z0-9_-]+$"
    ConstraintDescription: Must be 16-128 alphanumeric characters, hyphens, or underscores.

  InfraReadyAccountId:
    Type: String
    Description: >
      InfraReady's AWS account ID. Only this account can assume the role.
      Change only if directed by InfraReady support.
    Default: "073941171096"
    AllowedPattern: "^[0-9]{12}$"
    ConstraintDescription: Must be a 12-digit AWS account ID.

# ─── RESOURCES ─────────────────────────────────────────────────────────────────

Resources:
  InfraReadyRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: InfraReadyRole
      Description: >
        Cross-account role assumed by InfraReady's deployment runner.
        Scoped to the minimum permissions needed to deploy and manage
        InfraReady's OpenTofu modules in your account.

      # ── Trust Policy ─────────────────────────────────────────────────────────
      # Only InfraReady's account can assume this role, and ONLY when it
      # presents the ExternalId matching your account's unique token.
      # This prevents confused deputy attacks where a third party tricks
      # InfraReady into acting on their behalf using your role.
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowInfraReadyAssumeRole
            Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${InfraReadyAccountId}:root"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId

      MaxSessionDuration: 7200  # 2 hours — matches runner STS DurationSeconds

      # ── Inline Policy ────────────────────────────────────────────────────────
      # Inline (not managed) so it is always in sync with this stack and
      # cannot be detached independently. Scoped per service to what each
      # OpenTofu module actually creates and reads.
      Policies:
        - PolicyName: InfraReadyRunnerPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:

              # ── Networking (VPC module) ─────────────────────────────────────
              # Covers VPC, subnets, route tables, internet gateways, NAT
              # gateways, security groups, network ACLs, and VPC flow logs.
              - Sid: EC2Networking
                Effect: Allow
                Action:
                  - ec2:*
                Resource: "*"

              # ── Container Compute (ECS module) ──────────────────────────────
              # ECS clusters, services, task definitions, capacity providers.
              # ECR is required to push the runner image and pull app images.
              - Sid: ECSAndECR
                Effect: Allow
                Action:
                  - ecs:*
                  - ecr:*
                Resource: "*"

              # ── Database (RDS module) ────────────────────────────────────────
              # RDS instances, clusters, subnet groups, parameter groups,
              # option groups, snapshots, and event subscriptions.
              - Sid: RDS
                Effect: Allow
                Action:
                  - rds:*
                Resource: "*"

              # ── Object Storage (storage module + OpenTofu state bucket) ──────
              # S3 is needed for both the OpenTofu state backend (in customer's
              # own account) and the storage module (app uploads / assets).
              - Sid: S3
                Effect: Allow
                Action:
                  - s3:*
                Resource: "*"

              # ── IAM — Module Role Creation ───────────────────────────────────
              # OpenTofu modules create service roles (ECS task role, RDS
              # monitoring role, etc.). These are the only IAM actions needed.
              # CreateRole + PassRole covers all module service role needs.
              # Note: no iam:* wildcard — only the actions actually required.
              - Sid: IAMRoleManagement
                Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:GetRole
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:PutRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:GetRolePolicy
                  - iam:ListRolePolicies
                  - iam:ListAttachedRolePolicies
                  - iam:PassRole
                  - iam:CreateInstanceProfile
                  - iam:DeleteInstanceProfile
                  - iam:AddRoleToInstanceProfile
                  - iam:RemoveRoleFromInstanceProfile
                  - iam:GetInstanceProfile
                  - iam:TagRole
                  - iam:UntagRole
                  - iam:CreatePolicy
                  - iam:DeletePolicy
                  - iam:GetPolicy
                  - iam:GetPolicyVersion
                  - iam:CreatePolicyVersion
                  - iam:DeletePolicyVersion
                  - iam:ListPolicyVersions
                  # Required to delete an IAM role (AWS checks for instance profiles first)
                  - iam:ListInstanceProfilesForRole
                  # Required on first ALB deploy — ELB creates its service-linked role
                  - iam:CreateServiceLinkedRole
                  # Required for GitHub Actions OIDC provider (security module)
                  - iam:CreateOpenIDConnectProvider
                  - iam:GetOpenIDConnectProvider
                  - iam:DeleteOpenIDConnectProvider
                  - iam:TagOpenIDConnectProvider
                  - iam:UntagOpenIDConnectProvider
                  - iam:UpdateOpenIDConnectProviderThumbprint
                  - iam:ListOpenIDConnectProviders
                Resource: "*"

              # ── CloudFormation ────────────────────────────────────────────────
              # Some modules emit CloudFormation stacks as part of their
              # deployment lifecycle. Also needed for teardown stack checks.
              - Sid: CloudFormation
                Effect: Allow
                Action:
                  - cloudformation:*
                Resource: "*"

              # ── Security Baseline (security module) ──────────────────────────
              # CloudTrail, CloudWatch alarms/dashboards, CloudWatch Logs,
              # AWS Config rules, EventBridge (GuardDuty/SecurityHub routing),
              # and IAM password policy are all part of the security baseline.
              - Sid: SecurityBaseline
                Effect: Allow
                Action:
                  - cloudtrail:*
                  - cloudwatch:*
                  - logs:*
                  - config:*
                  - events:PutRule
                  - events:PutTargets
                  - events:DescribeRule
                  - events:DeleteRule
                  - events:RemoveTargets
                  - events:ListTargetsByRule
                  - events:ListRuleNamesByTarget
                  - events:ListTagsForResource
                  - events:TagResource
                  - events:UntagResource
                  - iam:UpdateAccountPasswordPolicy
                  - iam:GetAccountPasswordPolicy
                  - iam:DeleteAccountPasswordPolicy
                Resource: "*"

              # ── GuardDuty + Security Hub ──────────────────────────────────────
              - Sid: ThreatDetection
                Effect: Allow
                Action:
                  - guardduty:*
                  - securityhub:*
                Resource: "*"

              # ── KMS (kms module) ─────────────────────────────────────────────
              # Customer-managed keys for RDS, S3, and ECS secrets encryption.
              - Sid: KMS
                Effect: Allow
                Action:
                  - kms:*
                Resource: "*"

              # ── Backup (backup module) ────────────────────────────────────────
              - Sid: Backup
                Effect: Allow
                Action:
                  - backup:*
                  - backup-storage:*
                Resource: "*"

              # ── Inspector + SSM (inspector-ssm module) ───────────────────────
              - Sid: InspectorAndSSM
                Effect: Allow
                Action:
                  - inspector2:*
                  - ssm:*
                Resource: "*"

              # ── Macie (macie module) ──────────────────────────────────────────
              - Sid: Macie
                Effect: Allow
                Action:
                  - macie2:*
                Resource: "*"

              # ── WAF (waf module) ──────────────────────────────────────────────
              - Sid: WAF
                Effect: Allow
                Action:
                  - wafv2:*
                Resource: "*"

              # ── VPC Endpoints (vpc-endpoints module) ─────────────────────────
              # vpc-endpoints module creates interface endpoints — covered by
              # the ec2:* grant above. No additional statement needed.

              # ── Secrets Manager ───────────────────────────────────────────────
              # RDS passwords and API keys are stored in Secrets Manager.
              - Sid: SecretsManager
                Effect: Allow
                Action:
                  - secretsmanager:*
                Resource: "*"

              # ── SNS (security module alerting) ────────────────────────────────
              - Sid: SNS
                Effect: Allow
                Action:
                  - sns:*
                Resource: "*"

              # ── ElasticLoadBalancing (ecs module ALB) ─────────────────────────
              - Sid: ELB
                Effect: Allow
                Action:
                  - elasticloadbalancing:*
                Resource: "*"

              # ── ACM (ecs module TLS cert) ─────────────────────────────────────
              - Sid: ACM
                Effect: Allow
                Action:
                  - acm:*
                Resource: "*"

              # ── Route53 (ecs module DNS) ──────────────────────────────────────
              - Sid: Route53
                Effect: Allow
                Action:
                  - route53:*
                  - route53domains:*
                Resource: "*"

              # ── CloudFront (storage module CDN) ───────────────────────────────
              - Sid: CloudFront
                Effect: Allow
                Action:
                  - cloudfront:*
                Resource: "*"

              # ── Application Auto Scaling (ecs module) ─────────────────────────
              - Sid: AutoScaling
                Effect: Allow
                Action:
                  - application-autoscaling:*
                  - autoscaling:*
                Resource: "*"

              # ── STS — caller identity check ───────────────────────────────────
              # Runner calls GetCallerIdentity to verify the assumed-role session
              # is active before running OpenTofu. No other STS actions needed.
              - Sid: STSVerify
                Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: "*"

      Tags:
        - Key: ManagedBy
          Value: infraready
        - Key: Purpose
          Value: cross-account-deployment-runner

# ─── OUTPUTS ───────────────────────────────────────────────────────────────────

Outputs:
  RoleArn:
    Description: >
      Paste this ARN into the InfraReady wizard to complete setup.
      InfraReady will store it and use it to deploy your infrastructure.
    Value: !GetAtt InfraReadyRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-RoleArn"

  RoleName:
    Description: IAM role name (for your own records).
    Value: !Ref InfraReadyRole

  ExternalIdReminder:
    Description: >
      Reminder — your ExternalId is the token you entered as a parameter.
      Keep it private. Rotating it requires redeploying this stack.
    Value: !Sub "ExternalId is stored as a CloudFormation parameter — check Parameter Store or InfraReady dashboard."
